name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to iOS project'
        required: false
        type: string
        default: 'ios'
      configuration:
        description: 'Build configuration (Debug / Profile / Release)'
        required: false
        type: string
        default: 'Profile'           # ← Mặc định là Profile
      use_signing:
        description: 'Enable code signing'
        required: false
        type: boolean
        default: false
      flutter_version:
        description: 'Flutter version (empty = latest)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version || '' }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install Pods
        working-directory: ${{ inputs.ios_path }}
        run: pod install --repo-update || true

      - name: Build Flutter iOS
        env:
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          echo "🚀 Building Flutter with configuration: $CONFIGURATION"
          
          if [ "$CONFIGURATION" = "Debug" ]; then
            flutter build ios --debug --no-codesign --verbose
          elif [ "$CONFIGURATION" = "Profile" ]; then
            flutter build ios --profile --no-codesign --verbose
          else
            flutter build ios --release --no-codesign --verbose
          fi

      - name: Create IPA
        env:
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          mkdir -p build/Payload
          
          # Tìm .app (hỗ trợ tốt cho Profile và Release)
          APP_PATH=$(find build/ios -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: Cannot find .app file"
            exit 1
          fi
          
          echo "✅ Found app at: $APP_PATH"
          
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r "${BUILD_ID}.ipa" Payload
          echo "✅ Created IPA: ${BUILD_ID}.ipa"
          ls -lh "${BUILD_ID}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
          retention-days: 7
